kind: ConfigMap
apiVersion: v1
metadata:
  name: {{ include "timecalendar.fullname" . }}-configmap
data:
  # Node
  NODE_ENV: "production"
  APP_STAGE: {{ .Values.environment }}

  # HTTP
  PORT: "80"

  # URLs
  CLIENT_URL: "https://{{ .Values.clientUrl }}"

  # Redis
  REDIS_QUEUE: timecalendar
  REDIS_KEY_PREFIX: {{ .Values.environment }}

  # Postgres
  # DATABASE_URL (full connection string, incl. the password) is provided by the
  # timecalendar-env-secret, assembled from the existing secret parts — it must be
  # added to that sealed secret atomically with the PR1 server image that reads it
  # (the split DATABASE_HOST/PORT/USERNAME/MAIN_NAME vars are no longer read).
  PGSSLMODE: no-verify

  RUN_MIGRATIONS: "true"

  # SMTP
  SMTP_FROM: {{ .Values.timecalendar.smtpFrom }}

  API_USERNAME: {{ .Values.timecalendar.apiUsername }}

  S3_PUBLIC_BUCKET_CLIENT_URL: {{ .Values.timecalendar.s3PublicBucketClientUrl }}

  CRISP_IDENTIFIER: {{ .Values.timecalendar.crisp.identifier }}
  CRISP_WEBSITE_ID: {{ .Values.timecalendar.crisp.websiteId }}

  # OTEL
  OTEL_ENABLED: {{ .Values.timecalendar.otel.enabled | quote }}
  OTEL_EXPORTER_URL: {{ .Values.timecalendar.otel.exporterUrl }}
