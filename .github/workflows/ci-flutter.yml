name: CI Flutter (legacy app)

# The Flutter app is in bounded maintenance during the RN migration (R-5), so
# its tests run only on main/production pushes that touch app/ — not on every
# feature-branch push.
on:
  push:
    branches: [main, production]
    paths:
      - 'app/**'
      - '.github/workflows/ci-flutter.yml'

jobs:
  test-app:
    name: Run app tests
    runs-on: ubuntu-latest
    steps:

    - name: Checkout main
      uses: actions/checkout@v7

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.41.9
        cache: true

    - name: Install dependencies
      working-directory: ./app
      run: flutter pub get

    - name: Analyze
      working-directory: ./app
      run: flutter analyze test

    - name: Run tests
      working-directory: ./app
      run: flutter test


  test-e2e:
    name: Run E2E smoke flows
    runs-on: ubuntu-latest
    # Emulator cold boot is slow even with KVM acceleration, and run_e2e.sh now
    # runs every *_flow_test.dart file as its own `flutter test` process.
    timeout-minutes: 45
    steps:

    - name: Checkout main
      uses: actions/checkout@v7

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.41.9
        cache: true

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # run_e2e.sh boots the backend + Postgres, seeds, runs every E2E smoke
    # flow against the emulator (one `flutter test` process per flow file),
    # and tears down. Running it as the emulator action's `script` means an
    # Android device exists when step 6 resolves one — and the boot/seed logic
    # is not duplicated here.
    - name: Run E2E smoke harness
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        profile: pixel_6
        script: ./app/integration_test/run_e2e.sh
