name: CI build

on:
  push:

jobs:
  build-server:
    name: Build server image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/timecalendar/timecalendar
    steps:

    - name: Checkout main
      uses: actions/checkout@v4

    - name: Set target environment
      run: ./ci/set-target-env.sh

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to image repository
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: ./server
        tags: ${{ env.SERVER_IMAGES_WITH_TAG_TO_PUSH }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: true


  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/timecalendar/timecalendar-web
    steps:

    - name: Checkout main
      uses: actions/checkout@v4

    - name: Set target environment
      run: ./ci/set-target-env.sh

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to image repository
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile.web
        tags: ${{ env.WEB_IMAGES_WITH_TAG_TO_PUSH }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: true

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build-server
    steps:

    - name: Checkout main
      uses: actions/checkout@v4

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Start Postgres and Redis
      run: docker compose --env-file ./ci/.env.test -f server/docker-compose.yml up -d

    - name: Run tests
      run: docker run --env-file="./ci/.env.test" -e CI=true --network host ghcr.io/timecalendar/timecalendar:${{ github.sha }} npm run test


  test-app:
    name: Run app tests
    runs-on: ubuntu-latest
    steps:

    - name: Checkout main
      uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.41.9
        cache: true

    - name: Install dependencies
      working-directory: ./app
      run: flutter pub get

    - name: Analyze
      working-directory: ./app
      run: flutter analyze test

    - name: Run tests
      working-directory: ./app
      run: flutter test


  test-e2e:
    name: Run E2E smoke test
    runs-on: ubuntu-latest
    # Emulator cold boot is slow even with KVM acceleration.
    timeout-minutes: 30
    steps:

    - name: Checkout main
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.41.9
        cache: true

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # run_e2e.sh boots the backend + Postgres, seeds, runs the integration
    # test against the emulator, and tears down. Running it as the emulator
    # action's `script` means an Android device exists when step 6 resolves
    # one — and the boot/seed logic is not duplicated here.
    - name: Run E2E smoke harness
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        profile: pixel_6
        script: ./app/integration_test/run_e2e.sh


  deploy:
    name: Deploy
    needs: [build-server, build-web]
    if: github.ref == 'refs/heads/main' ||  github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:

    - name: Checkout main
      uses: actions/checkout@v2

    - name: Set target environment
      run: ./ci/set-target-env.sh

    - name: Set target environment Helm values
      run: echo "${{ secrets[env.K8S_HELM_VALUES_ENV] }}" > ./k8s/environments/$TARGET_ENVIRONMENT/secret-values.yaml

    - name: Set Kubernetes context
      uses: azure/k8s-set-context@v2
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets[env.K8S_KUBECONFIG_ENV] }}

    - name: Deploy
      run: ./k8s/deploy.sh
