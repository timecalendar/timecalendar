name: CI build

on:
  push:

jobs:
  build-server:
    name: Build server image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/timecalendar/timecalendar
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Set target environment
      run: ./ci/set-target-env.sh

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Build server image
      uses: docker/build-push-action@v7
      with:
        context: ./server
        tags: ghcr.io/timecalendar/timecalendar:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        load: true

    - name: Save server image to tarball
      run: docker save ghcr.io/timecalendar/timecalendar:${{ github.sha }} -o /tmp/server-image.tar

    - name: Upload server image artifact
      uses: actions/upload-artifact@v7
      with:
        name: server-image
        path: /tmp/server-image.tar
        retention-days: 1

    - name: Login to image repository
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push server image
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
      uses: docker/build-push-action@v7
      with:
        context: ./server
        tags: ${{ env.SERVER_IMAGES_WITH_TAG_TO_PUSH }}
        cache-from: type=gha
        push: true


  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/timecalendar/timecalendar-web
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Set target environment
      run: ./ci/set-target-env.sh

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to image repository
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build (and conditionally push) web image
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./Dockerfile.web
        tags: ${{ env.WEB_IMAGES_WITH_TAG_TO_PUSH }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/production' }}

  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build-server
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Download server image artifact
      uses: actions/download-artifact@v8
      with:
        name: server-image
        path: /tmp

    - name: Load server image
      run: docker load -i /tmp/server-image.tar

    - name: Start Postgres and Redis
      run: docker compose --env-file ./ci/.env.test -f server/docker-compose.yml up -d

    - name: Run tests
      run: docker run --env-file="./ci/.env.test" -e CI=true --network host ghcr.io/timecalendar/timecalendar:${{ github.sha }} npm run test

    # The Nest app cannot boot without a service-account-shaped key file; the
    # spec emit only needs the JSON shape, never a real credential.
    - name: Generate dummy Firebase service-account key
      run: ./ci/generate-dummy-firebase-key.sh /tmp/serviceAccountKey.json

    # The image's dist/ was built from this same commit (with the swagger CLI
    # plugin applied), so emitting from it reproduces `npm run generate:openapi`.
    - name: Check committed OpenAPI spec matches the server code
      run: |
        docker run --env-file="./ci/.env.test" --network host \
          -e NODE_ENV=test \
          -e OPENAPI_OUTPUT_PATH=/openapi-out/openapi.json \
          -v /tmp/serviceAccountKey.json:/usr/src/app/config/serviceAccountKey.json:ro \
          -v "$PWD/openapi":/openapi-out \
          ghcr.io/timecalendar/timecalendar:${{ github.sha }} \
          node dist/generate-openapi.js
        git diff --exit-code openapi/openapi.json || {
          echo "::error::openapi/openapi.json is out of date with the server code — run 'npm run generate:openapi' in server/ and commit the result"
          exit 1
        }


  test-mobile:
    name: Run mobile checks
    runs-on: ubuntu-latest
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: mobile/package-lock.json

    - name: Install dependencies
      working-directory: ./mobile
      run: npm ci

    - name: Check generated API client matches the committed spec
      working-directory: ./mobile
      run: |
        npm run generate
        git diff --exit-code src/api/generated || {
          echo "::error::mobile/src/api/generated is out of date with openapi/openapi.json — run 'npm run generate' in mobile/ and commit the result"
          exit 1
        }

    # Generates the gitignored expo-env.d.ts and .expo/types (typed routes,
    # CSS module declarations) that `expo start` produces locally — the
    # documented way to typecheck in CI without a dev server.
    - name: Generate Expo type declarations
      working-directory: ./mobile
      run: npx expo customize tsconfig.json

    - name: Typecheck
      working-directory: ./mobile
      run: npx tsc --noEmit

    - name: Lint
      working-directory: ./mobile
      run: npm run lint

    # Coverage is reported, not gated: no coverageThreshold yet (K-3 deferred to
    # the first logic-bearing feature). Same `npm test` entrypoint as local.
    - name: Test
      working-directory: ./mobile
      run: npm test -- --coverage


  test-app:
    name: Run app tests
    runs-on: ubuntu-latest
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.41.9
        cache: true

    - name: Install dependencies
      working-directory: ./app
      run: flutter pub get

    - name: Analyze
      working-directory: ./app
      run: flutter analyze test

    - name: Run tests
      working-directory: ./app
      run: flutter test


  test-e2e:
    name: Run E2E smoke flows
    runs-on: ubuntu-latest
    # Emulator cold boot is slow even with KVM acceleration, and run_e2e.sh now
    # runs every *_flow_test.dart file as its own `flutter test` process.
    timeout-minutes: 45
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: stable
        flutter-version: 3.41.9
        cache: true

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # run_e2e.sh boots the backend + Postgres, seeds, runs every E2E smoke
    # flow against the emulator (one `flutter test` process per flow file),
    # and tears down. Running it as the emulator action's `script` means an
    # Android device exists when step 6 resolves one — and the boot/seed logic
    # is not duplicated here.
    - name: Run E2E smoke harness
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        profile: pixel_6
        script: ./app/integration_test/run_e2e.sh


  e2e-mobile-android:
    name: Run mobile E2E (Android)
    runs-on: ubuntu-latest
    needs: build-server
    # Emulator cold boot + a release Gradle build are both slow; KVM keeps the
    # emulator usable but the whole job is the long pole alongside the iOS one.
    timeout-minutes: 60
    env:
      # Reuse the build-server artifact image — the shared lifecycle skips its
      # own build when E2E_SERVER_IMAGE is set (ci/e2e-server.sh).
      E2E_SERVER_IMAGE: ghcr.io/timecalendar/timecalendar:${{ github.sha }}
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Download server image artifact
      uses: actions/download-artifact@v8
      with:
        name: server-image
        path: /tmp

    - name: Load server image
      run: docker load -i /tmp/server-image.tar

    # JDK 17 for both the Gradle build and Maestro (Maestro is JVM-based).
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: mobile/package-lock.json

    - name: Install mobile dependencies
      working-directory: ./mobile
      run: npm ci

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    # Generate native android/ for the dev variant (.dev id, timecalendar-dev
    # scheme, cleartext exception). CNG: ios/android are never committed.
    - name: Prebuild Android (dev variant)
      working-directory: ./mobile
      env:
        APP_VARIANT: development
      run: npx expo prebuild --platform android --clean

    # Release config embeds the JS bundle (no Metro). EXPO_PUBLIC_API_URL is
    # baked here, at bundle time: 10.0.2.2 is the host loopback from the emulator.
    - name: Build release APK
      working-directory: ./mobile/android
      env:
        APP_VARIANT: development
        EXPO_PUBLIC_API_URL: http://10.0.2.2:3005
      run: ./gradlew :app:assembleRelease

    - name: Install Maestro
      run: |
        curl -fsSL https://get.maestro.mobile.dev | bash
        echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

    - name: Enable KVM
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    # The emulator exists only inside this action's `script`, so the APK install
    # and the e2e run both live here. run_e2e.sh boots the server stack (compose,
    # reusing E2E_SERVER_IMAGE), runs the Maestro flows, and tears down.
    - name: Run mobile E2E flows
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 34
        arch: x86_64
        profile: pixel_6
        script: |
          adb install -r mobile/android/app/build/outputs/apk/release/app-release.apk
          ./mobile/e2e/run_e2e.sh

    - name: Upload Maestro debug output
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: maestro-debug-android
        path: ~/.maestro/tests
        retention-days: 7

    - name: Upload server logs
      if: failure()
      run: ./ci/e2e-server.sh logs > /tmp/e2e-server-android.log 2>&1 || true

    - name: Upload server logs artifact
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-server-logs-android
        path: /tmp/e2e-server-android.log
        retention-days: 7


  e2e-mobile-ios:
    name: Run mobile E2E (iOS)
    # macos-26 ships Xcode 26 (Swift 6.2). Required: Expo SDK 56 / RN pods
    # declare Swift tools 6.2, and macos-latest's default Xcode (16.x, Swift
    # 6.1) fails SPM resolution ("installed version is 6.1.0").
    runs-on: macos-26
    # A cold xcodebuild is ~20-40 min. The CocoaPods download cache (the spec
    # repo + downloaded pods, outside the repo tree) survives `prebuild --clean`
    # and shaves the pod-install step; DerivedData lives under the cleaned ios/
    # so it can't be cached across runs. npm is cached by setup-node.
    timeout-minutes: 75
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    # JDK for Maestro (JVM-based).
    - name: Set up Java
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 17

    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: mobile/package-lock.json

    - name: Install mobile dependencies
      working-directory: ./mobile
      run: npm ci

    # Survives `prebuild --clean` (lives outside the repo); speeds pod install.
    - name: Cache CocoaPods downloads
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/CocoaPods
          ~/.cocoapods
        key: cocoapods-${{ hashFiles('mobile/package-lock.json') }}
        restore-keys: cocoapods-

    # macOS runners have no Docker (no nested virt). Provision Postgres/Redis
    # natively on the test-env ports so e2e-server.sh --native can seed + boot
    # the server from source against them.
    - name: Provision Postgres and Redis (native)
      run: |
        brew install postgresql@14 redis
        PGBIN="$(brew --prefix postgresql@14)/bin"
        PGDATA="$(brew --prefix)/var/postgresql@14"
        "$PGBIN/pg_ctl" -D "$PGDATA" -o "-p 37291" -l /tmp/pg.log start
        for _ in $(seq 1 30); do "$PGBIN/pg_isready" -p 37291 && break; sleep 1; done
        # Test config connects as a `postgres` superuser with an empty password.
        "$PGBIN/createuser" -p 37291 -s postgres || true
        "$PGBIN/createdb" -p 37291 -U postgres timecalendar || true
        "$PGBIN/createdb" -p 37291 -U postgres timecalendar_test || true
        redis-server --port 37292 --daemonize yes

    - name: Prebuild iOS (dev variant)
      working-directory: ./mobile
      env:
        APP_VARIANT: development
      run: npx expo prebuild --platform ios --clean

    # Release config embeds the JS bundle (no Metro). EXPO_PUBLIC_API_URL baked
    # here: localhost reaches the host server from the iOS simulator.
    - name: Build Release simulator app
      working-directory: ./mobile/ios
      env:
        APP_VARIANT: development
        EXPO_PUBLIC_API_URL: http://localhost:3005
      run: |
        WORKSPACE="$(ls -d *.xcworkspace | head -n1)"
        SCHEME="$(xcodebuild -workspace "$WORKSPACE" -list -json \
          | python3 -c 'import json,sys; print(json.load(sys.stdin)["workspace"]["schemes"][0])')"
        echo "Building workspace=$WORKSPACE scheme=$SCHEME"
        xcodebuild \
          -workspace "$WORKSPACE" \
          -scheme "$SCHEME" \
          -configuration Release \
          -sdk iphonesimulator \
          -derivedDataPath build \
          CODE_SIGNING_ALLOWED=NO \
          build

    - name: Boot a simulator and install the app
      working-directory: ./mobile/ios
      run: |
        DEVICE="$(xcrun simctl list devices available --json \
          | python3 -c 'import json,sys; d=json.load(sys.stdin)["devices"]; print(next(x["udid"] for v in d.values() for x in v if "iPhone" in x["name"]))')"
        echo "Using simulator $DEVICE"
        xcrun simctl boot "$DEVICE" || true
        APP="$(ls -d build/Build/Products/Release-iphonesimulator/*.app | head -n1)"
        xcrun simctl install "$DEVICE" "$APP"

    - name: Install Maestro
      run: |
        curl -fsSL https://get.maestro.mobile.dev | bash
        echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

    # --native: server from source against the natively-provisioned Postgres/Redis.
    - name: Run mobile E2E flows
      run: ./mobile/e2e/run_e2e.sh --native

    - name: Upload Maestro debug output
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: maestro-debug-ios
        path: ~/.maestro/tests
        retention-days: 7

    - name: Upload server logs
      if: failure()
      run: ./ci/e2e-server.sh logs --native > /tmp/e2e-server-ios.log 2>&1 || true

    - name: Upload server logs artifact
      if: failure()
      uses: actions/upload-artifact@v7
      with:
        name: e2e-server-logs-ios
        path: /tmp/e2e-server-ios.log
        retention-days: 7


  deploy:
    name: Deploy
    needs: [build-server, build-web]
    if: github.ref == 'refs/heads/main' ||  github.ref == 'refs/heads/production'
    runs-on: ubuntu-latest
    steps:

    - name: Checkout main
      uses: actions/checkout@v6

    - name: Set target environment
      run: ./ci/set-target-env.sh

    - name: Set target environment Helm values
      run: echo "${{ secrets[env.K8S_HELM_VALUES_ENV] }}" > ./k8s/environments/$TARGET_ENVIRONMENT/secret-values.yaml

    - name: Set Kubernetes context
      uses: azure/k8s-set-context@v5
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets[env.K8S_KUBECONFIG_ENV] }}

    - name: Deploy
      run: ./k8s/deploy.sh
