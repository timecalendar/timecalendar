version: 2
updates:
  # NestJS backend
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      dev-and-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Next.js web app
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-and-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Generated OpenAPI JavaScript client
  - package-ecosystem: "npm"
    directory: "/openapi/javascript"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-and-minor:
        update-types:
          - "minor"
          - "patch"

  # Generated OpenAPI Dart client
  - package-ecosystem: "pub"
    directory: "/openapi/dart"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-and-minor:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
