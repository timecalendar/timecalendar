version: 2
updates:
  # NestJS backend
  - package-ecosystem: "npm"
    directory: "/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
      dev-and-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Root npm workspace: web + generated OpenAPI JavaScript client.
  # Must point at "/" (where package-lock.json lives): pointing at a
  # workspace member updates only its package.json, leaving the root
  # lockfile out of sync and breaking `npm ci`.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-and-minor:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  # Generated OpenAPI Dart client
  - package-ecosystem: "pub"
    directory: "/openapi/dart"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      dev-and-minor:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
